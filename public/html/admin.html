<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ผู้ดูแลระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>
<nav class="navbar navbar-expand-lg app-navbar">
<div class="container">
<a class="navbar-brand" href="/">Smart Meter</a>
<div class="nav-actions">
<a class="nav-link" href="/daily">รายวัน</a>
<a class="nav-link" href="/monthly">รายเดือน</a>
<a class="nav-link active" href="/admin">ผู้ดูแล</a>
</div>
</div>
</nav>

<main class="container page-shell">
<section class="page-heading">
<div>
<p class="eyebrow">จัดการระบบ</p>
<h1>ผู้ดูแลระบบ</h1>
</div>
<p class="heading-copy">จัดการข้อมูลบ้าน เจ้าของ สถานะการใช้งาน และประวัติการอ่านค่ามิเตอร์</p>
</section>

<section class="admin-layout">
<div class="surface-panel">
<div class="panel-header">
<div>
<p class="eyebrow">ทะเบียนบ้าน</p>
<h2>เพิ่มบ้าน</h2>
</div>
</div>

<div class="form-grid">
<input id="house_name" class="form-control" placeholder="ชื่อบ้าน">
<input id="owner_name" class="form-control" placeholder="ชื่อเจ้าของ">
<input id="address" class="form-control" placeholder="ที่อยู่">
<input id="phone" class="form-control" placeholder="เบอร์โทร">
</div>

<button class="btn btn-primary action-button mt-3" onclick="addHouse()">เพิ่มบ้าน</button>
</div>

<div class="surface-panel">
<div class="panel-header">
<div>
<p class="eyebrow">รายการบ้าน</p>
<h2>บ้านทั้งหมด</h2>
</div>
<div id="totalHouses" class="total-pill"></div>
</div>
<div id="houseList"></div>
</div>
</section>

<template id="houseTemplate">
<div class="house-card">
  <div>
    <h3 class="house-name"></h3>
    <p class="owner"></p>
    <p class="address"></p>
    <p class="phone"></p>
  </div>
  <div class="house-actions">
    <button class="btn btn-warning btn-sm editBtn">แก้ไข</button>
    <button class="btn btn-danger btn-sm deleteBtn">ปิดใช้งาน</button>
  </div>
</div>
</template>

<section class="surface-panel mt-4">
<div class="panel-header">
<div>
<p class="eyebrow">ข้อมูลมิเตอร์</p>
<h2>รายการอ่านค่าทั้งหมด</h2>
</div>
</div>

<div class="toolbar-grid mb-3">
<input id="searchHouse" class="form-control" placeholder="ค้นหาชื่อบ้าน..." oninput="renderReadings()">
<select id="sortType" class="form-select" onchange="renderReadings()">
<option value="latest">เวลาใหม่ล่าสุด</option>
<option value="oldest">เวลาเก่าสุด</option>
<option value="house">เรียงตามชื่อบ้าน</option>
<option value="unit_high">ใช้ไฟมากที่สุด</option>
<option value="unit_low">ใช้ไฟน้อยที่สุด</option>
</select>
</div>

<div class="table-responsive">
<table class="table align-middle data-table">
<thead>
<tr>
<th>บ้าน</th>
<th>หน่วยไฟ</th>
<th>เวลา</th>
<th>รูปภาพ</th>
<th></th>
</tr>
</thead>
<tbody id="readingTable"></tbody>
</table>
</div>
</section>
</main>

<script src="../js/admin.js"></script>
</body>
</html>
