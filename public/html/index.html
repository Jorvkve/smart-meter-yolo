<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Meter System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">
</head>

<body class="bg-dark text-white">

<div class="container dashboard-container">
    <div class="header-section text-center">
        <h3 class="dashboard-title">
            <span class="bolt-icon">⚡</span> Smart Meter Dashboard
        </h3>
        <p class="text-secondary">ระบบจัดการและวิเคราะห์การใช้พลังงาน</p>
    </div>

    <div class="row g-4 mt-2">
        <div class="col-md-4">
            <a href="/daily" class="text-decoration-none">
                <div class="card menu-card card-daily">
                    <div class="card-glass-overlay"></div>
                    <div class="card-content">
                        <div class="menu-icon-wrapper">📊</div>
                        <div class="menu-title">รายวัน</div>
                        <div class="menu-desc">ตรวจสอบการใช้ไฟฟ้าแบบ Real-time</div>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/monthly" class="text-decoration-none">
                <div class="card menu-card card-monthly">
                    <div class="card-glass-overlay"></div>
                    <div class="card-content">
                        <div class="menu-icon-wrapper">📅</div>
                        <div class="menu-title">รายเดือน</div>
                        <div class="menu-desc">วิเคราะห์สถิติและหน่วยไฟย้อนหลัง</div>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/admin" class="text-decoration-none">
                <div class="card menu-card card-admin">
                    <div class="card-glass-overlay"></div>
                    <div class="card-content">
                        <div class="menu-icon-wrapper">⚙️</div>
                        <div class="menu-title">Admin</div>
                        <div class="menu-desc">ตั้งค่าบ้านและจัดการข้อมูลระบบ</div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
